services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: glms-sql
    environment:
      SA_PASSWORD: "TechMove@2026"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    networks:
      - glms-network

  glms-backend-api:
    build:
      context: .
      dockerfile: TechMove.GLMS.API/Dockerfile
    container_name: glms-api
    depends_on:
      - sql-server-db
    environment:
      - ConnectionStrings__DefaultConnection=Server=sql-server-db;Database=TechMoveGLMS;User=sa;Password=TechMove@2026;TrustServerCertificate=true
      - Jwt__Key=TechMoveSecretKey2026ForAssignmentPurposeOnly
      - Jwt__Issuer=TechMoveAPI
      - Jwt__Audience=TechMoveMVC
    ports:
      - "7273:80"
    networks:
      - glms-network

  glms-frontend-web:
    build:
      context: .
      dockerfile: TechMove.GLMS.Web/Dockerfile
    container_name: glms-web
    depends_on:
      - glms-backend-api
    environment:
      - ApiBaseUrl=http://glms-backend-api:80
    ports:
      - "8080:80"
    networks:
      - glms-network

networks:
  glms-network:
    driver: bridge